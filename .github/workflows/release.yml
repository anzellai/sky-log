name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: sky-log-linux-x64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            artifact: sky-log-linux-arm64
          - os: macos-15
            goos: darwin
            goarch: amd64
            artifact: sky-log-darwin-x64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: sky-log-darwin-arm64
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            artifact: sky-log-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Install Sky compiler
        run: curl -fsSL https://raw.githubusercontent.com/anzellai/sky/main/install.sh | sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: sky install

      - name: Compile Sky to Go
        run: sky build

      - name: Cross-compile Go binary
        run: |
          cd dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o ../${{ matrix.artifact }} .
        env:
          CGO_ENABLED: 0

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"* release/ 2>/dev/null || true
          done
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
