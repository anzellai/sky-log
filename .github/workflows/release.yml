name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Build Sky source → Go source on one runner, then cross-compile
  compile:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Install Sky compiler
        run: curl -fsSL https://raw.githubusercontent.com/anzellai/sky/main/install.sh | SKY_VERSION=0.7.16 sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Install dependencies
        run: sky install

      - name: Compile Sky to Go
        run: |
          sky build src/Main.sky
          echo "Declarations: $(grep -c 'func ' sky-out/main.go)"
          echo "Files in sky-out:"
          ls sky-out/

      - name: Upload Go source
        uses: actions/upload-artifact@v4
        with:
          name: go-source
          path: sky-out/

  build:
    needs: compile
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: sky-log-linux-x64
          - os: ubuntu-24.04-arm
            artifact: sky-log-linux-arm64
          - os: macos-15
            artifact: sky-log-darwin-x64
          - os: macos-latest
            artifact: sky-log-darwin-arm64
          - os: windows-latest
            artifact: sky-log-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Download Go source
        uses: actions/download-artifact@v4
        with:
          name: go-source
          path: sky-out

      - name: Build binary
        run: |
          cd sky-out
          go build -gcflags="all=-l" -ldflags="-s -w" -o ../${{ matrix.artifact }} .
          ls -la ../${{ matrix.artifact }}
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            [[ "$dir" == *"go-source"* ]] && continue
            cp "$dir"* release/ 2>/dev/null || true
          done
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
