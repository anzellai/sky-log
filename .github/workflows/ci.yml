name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Install Sky compiler
        run: curl -fsSL https://raw.githubusercontent.com/anzellai/sky/main/install.sh | SKY_VERSION=0.7.16 sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Install dependencies
        run: sky install

      - name: Build
        run: sky build src/Main.sky

      - name: Verify binary
        run: |
          test -x ./sky-out/app && file ./sky-out/app
          ./sky-out/app --help | head -3
